<!DOCTYPE html>
<html>
<head>

<title>DoS Attack Detection Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>DoS Attack Detection Dashboard</h1>

<div class="controls">

<button onclick="startSystem()">Start System</button>
<button onclick="stopSystem()">Stop System</button>
<button onclick="clearSystem()">Clear</button>

<select id="timeRange" onchange="changeRange()">
<option value="30">30s</option>
<option value="60">1 minute</option>
<option value="300">5 minutes</option>
</select>

</div>

<p>Scan Timer: <span id="timer">0</span>s</p>

<h3>Attack Type</h3>
<p id="attackType">None</p>

<h3>Detected Attacks</h3>
<p id="attackCount">0</p>

<h3>Network Traffic</h3>

<canvas id="trafficChart"></canvas>

<h3>Attack Alerts</h3>

<table>
<thead>
<tr>
<th>IP Address</th>
<th>Country</th>
<th>Packets</th>
<th>Time</th>
</tr>
</thead>

<tbody id="alertTable"></tbody>
</table>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
